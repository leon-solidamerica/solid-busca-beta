<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Solid Busca</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  margin: 80px;
}
input {
  width: 400px;
  padding: 10px;
}
.result {
  margin-top: 20px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
  text-align: left;
}
.article {
  padding: 10px;
  border-bottom: 1px solid #ddd;
}
</style>
</head>
<body>

<h1>Solid Busca</h1>

<input type="text" id="search" placeholder="Buscar...">

<button onclick="buscar()">Buscar</button>

<div id="resultados" class="result"></div>

<script>
const SUPABASE_URL = "https://ljitoiksdcejzywdkzug.supabase.co";
const SUPABASE_KEY = "sb_publishable_kiou9x6LO2MJfAdACvcn4w_wzUSFwEf";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

async function buscar() {
  const { data, error } = await db
    .from("artigos")
    .select("*");

  console.log("DATA:", data);
  console.log("ERROR:", error);

  if (error) return;

  let html = "";

  data.forEach(function(item) {
    html += "<div><strong>" +
      item.titulo +
      "</strong><br>" +
      item.conteudo +
      "</div>";
  });

  document.getElementById("resultados").innerHTML = html;
}
</script>

</body>
</html>
